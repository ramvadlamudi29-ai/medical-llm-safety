name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      APP_API_KEYS: test-key
      ENABLE_BUDGET_TRACKING: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run evaluation
        run: python scripts/evaluate.py --cases data/eval_cases.jsonl

      - name: Run benchmark (smoke)
        run: python scripts/benchmark.py --n 12
